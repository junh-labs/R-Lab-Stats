<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>应统-智能刷题</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- MathJax for rendering statistical formulas -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .slide-container {
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        .slide-card {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-full flex flex-col overflow-hidden select-none">

    <!-- Top Native-style Navigation Bar (Global) -->
    <header class="bg-gradient-to-r from-indigo-600 via-indigo-700 to-violet-800 text-white shadow-md shrink-0 safe-top z-10">
        <div class="px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-sm">
                    <i class="fa-solid fa-graduation-cap text-lg text-cyan-300"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold tracking-tight">应用统计学期末冲刺</h1>
                    <p class="text-[10px] text-indigo-200">20对双生考点 • 40题深度强化</p>
                </div>
            </div>
            
            <!-- Quick mode switch for Quiz View -->
            <div id="quiz-header-actions" class="bg-black/20 p-0.5 rounded-full flex items-center space-x-1 text-[11px] transition-opacity">
                <button id="btn-practice-mode" onclick="switchMode('practice')" class="px-2.5 py-1.5 rounded-full font-medium transition-all duration-200 bg-white text-indigo-900 shadow-sm">
                    背题模式
                </button>
                <button id="btn-exam-mode" onclick="switchMode('exam')" class="px-2.5 py-1.5 rounded-full font-medium transition-all duration-200 text-white hover:bg-white/10">
                    模考模式
                </button>
            </div>
        </div>
        <!-- Realtime Top Progress Bar -->
        <div class="w-full bg-black/20 h-1">
            <div id="top-progress-bar" class="bg-cyan-400 h-full transition-all duration-300 rounded-r-full" style="width: 0%"></div>
        </div>
    </header>

    <!-- ==================== VIEW 1: QUIZ (刷题实战) ==================== -->
    <div id="view-quiz" class="flex-grow flex flex-col relative w-full h-full overflow-hidden">
        <!-- Floating Stats Header Dashboard -->
        <div class="bg-white border-b border-slate-200 shadow-sm px-4 py-2 flex justify-between items-center text-xs shrink-0 z-10">
            <div class="flex items-center space-x-3">
                <span class="text-slate-500">当前进度：<strong class="text-indigo-600 font-bold text-sm" id="lbl-question-index">1/40</strong></span>
            </div>
            <div class="flex items-center space-x-3">
                <span class="text-slate-500">正确率：<strong class="text-emerald-600 font-bold" id="lbl-accuracy">0%</strong></span>
                <span class="text-slate-300">|</span>
                <button onclick="toggleFilter()" id="btn-filter-wrong" class="text-slate-500 hover:text-rose-500 transition flex items-center gap-1">
                    <i class="fa-solid fa-circle-xmark text-rose-400"></i> 错题本(<span id="lbl-wrong-count" class="font-bold">0</span>)
                </button>
            </div>
        </div>

        <!-- Main Swipe Area -->
        <main class="flex-grow flex flex-col justify-center px-4 py-3 w-full max-w-md mx-auto slide-container relative">
            <div id="gesture-guide" class="absolute inset-0 bg-indigo-950/40 backdrop-blur-sm z-30 flex flex-col justify-center items-center text-white pointer-events-none transition-opacity duration-500 opacity-0 rounded-2xl mx-4 my-2">
                <div class="bg-black/70 p-6 rounded-2xl text-center space-y-3 shadow-2xl">
                    <i class="fa-solid fa-arrows-left-right text-4xl text-cyan-400 animate-bounce"></i>
                    <p class="text-sm font-semibold tracking-wide">支持左右滑动切换题目</p>
                </div>
            </div>

            <!-- Single Question Active Card -->
            <div id="quiz-card" class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-5 w-full flex flex-col min-h-[420px] max-h-[600px] slide-card overflow-y-auto custom-scrollbar">
                <div class="space-y-4 flex-grow">
                    <div class="flex justify-between items-center text-xs">
                        <span id="card-badge" class="bg-indigo-50 text-indigo-600 font-semibold px-2.5 py-1 rounded-md border border-indigo-100">分类加载中</span>
                        <button onclick="toggleStar()" class="p-1.5 bg-slate-50 rounded-full text-slate-300 hover:text-amber-500 transition shadow-sm">
                            <i id="star-icon" class="fa-regular fa-star text-base"></i>
                        </button>
                    </div>
                    <div class="space-y-3">
                        <h2 id="card-title" class="text-base font-bold text-slate-800 leading-snug tracking-tight">题目加载中...</h2>
                        <div id="card-text" class="text-sm text-slate-600 leading-relaxed bg-slate-50/80 p-3.5 rounded-xl border border-slate-100 font-medium">
                            正在加载统计学题库，请稍候...
                        </div>
                    </div>
                    <!-- Dynamic choices grid container -->
                    <div id="card-choices" class="space-y-2.5 pt-2"></div>
                </div>

                <!-- Dynamic Feedback & Explanation Block -->
                <div id="card-feedback" class="mt-5 pt-4 border-t border-slate-100 text-sm hidden shrink-0"></div>
            </div>
        </main>

        <!-- Quiz Navigation Footer -->
        <div class="bg-white border-t border-slate-200 p-3 shrink-0">
            <div class="max-w-md mx-auto flex justify-between items-center gap-3">
                <button onclick="navigateQuestion(-1)" id="btn-prev" class="flex-1 py-3 bg-slate-50 hover:bg-slate-100 text-slate-600 font-semibold rounded-xl text-sm transition flex items-center justify-center gap-1.5 active:scale-95 border border-slate-200 shadow-sm">
                    <i class="fa-solid fa-chevron-left text-[10px]"></i> 上一题
                </button>

                <div class="flex-none">
                    <button onclick="submitExam()" id="btn-exam-submit" class="hidden px-5 py-3 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl text-sm transition shadow-lg shadow-amber-500/30 active:scale-95">
                        <i class="fa-solid fa-paper-plane mr-1.5"></i>交卷
                    </button>
                    <button onclick="resetAll()" id="btn-reset-shortcut" class="px-4 py-3 bg-slate-50 hover:bg-rose-50 text-slate-400 hover:text-rose-500 rounded-xl text-sm transition border border-slate-200 shadow-sm" title="重置记录">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>

                <button onclick="navigateQuestion(1)" id="btn-next" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl text-sm transition flex items-center justify-center gap-1.5 active:scale-95 shadow-lg shadow-indigo-600/30">
                    下一题 <i class="fa-solid fa-chevron-right text-[10px]"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== VIEW 2: STUDY (知识背记) ==================== -->
    <div id="view-study" class="hidden flex-grow flex-col relative w-full h-full overflow-hidden bg-slate-50">
        <div class="bg-white px-4 py-3 border-b border-slate-200 flex justify-between items-center shrink-0 shadow-sm z-10">
            <h2 class="text-sm font-bold text-slate-800"><i class="fa-solid fa-book-open text-indigo-500 mr-2"></i>期末冲刺考点速记卡</h2>
            <span class="text-[10px] bg-indigo-50 text-indigo-600 border border-indigo-100 px-2 py-1 rounded-md font-semibold tracking-wide">共20个知识点</span>
        </div>
        
        <!-- Study Cards List Container -->
        <main id="study-cards-container" class="flex-grow overflow-y-auto px-4 py-5 space-y-4 custom-scrollbar pb-8 max-w-md mx-auto w-full">
            <!-- Cards will be injected here by JS -->
        </main>
    </div>

    <!-- ==================== GLOBAL BOTTOM TAB BAR ==================== -->
    <nav class="bg-white border-t border-slate-200 w-full shrink-0 z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-safe">
        <div class="max-w-md mx-auto flex justify-around items-center h-14">
            <button onclick="switchTab('quiz')" id="tab-quiz" class="flex-1 h-full flex flex-col items-center justify-center gap-1 text-indigo-600 transition">
                <i class="fa-solid fa-pen-to-square text-lg"></i>
                <span class="text-[10px] font-bold">刷题实战</span>
            </button>
            <button onclick="switchTab('study')" id="tab-study" class="flex-1 h-full flex flex-col items-center justify-center gap-1 text-slate-400 hover:text-indigo-500 transition">
                <i class="fa-solid fa-layer-group text-lg"></i>
                <span class="text-[10px] font-bold">知识背记</span>
            </button>
        </div>
    </nav>

    <!-- Core Interactive Application Logic -->
    <script>
        const studyNotes = [
            { category: '选择题考点', title: '1. 20kg相关概念辨析：指标、变量、标志等', content: `<ul class="list-disc pl-4 space-y-1"><li><b>总体 (Population)</b>：客观存在的、具有共同性质的许多个别事物的整体。</li><li><b>总体单位 (Unit)</b>：构成总体的每一个个别事物的个体（如：每一袋产品）。</li><li><b>标志 (Attribute)</b>：总体单位所共同具有的特征。分为品质标志（文字说明，如颜色）和数量标志（数值表示，如重量20.15kg）。</li><li><b>变量 (Variable)</b>：可变的数量标志或品质标志（如净重在20kg上下浮动）。</li><li><b>指标 (Indicator)</b>：反映总体数量特征的概念和数值（如平均净重20.02kg）。</li></ul><p class="mt-2 text-indigo-600 font-semibold"><i class="fa-solid fa-lightbulb mr-1"></i>核心差别：标志反映“个体”特征，指标反映“总体”特征。</p>` },
            { category: '选择题考点', title: '2. 统计指标的定义、特征与分类', content: `<p><b>定义：</b>反映社会经济现象总体数量特征的概念和数值。</p><p class="mt-1"><b>基本特征：</b>数量性（必须用数字表示）、综合性、具体性。</p><p class="mt-1"><b>分类：</b></p><ul class="list-disc pl-4 mt-1"><li><b>总量指标 (绝对数)</b>：反映现象总规模/水平（如总产量）。</li><li><b>相对指标 (相对数)</b>：两联系指标对比的比率（如合格率）。</li><li><b>平均指标 (平均数)</b>：反映总体达到的一般水平（如人均收入）。</li></ul>` },
            { category: '选择题考点', title: '3. 调查方法判断（如新冠疫苗针数）', content: `<p><b>适用调查方法：</b>抽样调查 (Sampling Survey)。</p><p class="mt-1 text-slate-500"><b>原因：</b>目标总体庞大，普查耗费过大。抽样调查具有经济性、时效性及高准确性。</p>` },
            { category: '选择题考点', title: '4. 全面调查（普查）的定义与概念', content: `<p><b>定义：</b>对总体每一个单位进行调查（如普查）。</p><ul class="list-disc pl-4 mt-1"><li><b>特点：</b>一次性/周期性；工作量大；理论准确度高但易产生登记性误差。</li><li><b>限制：</b>当调查具有破坏性（如检验灯泡寿命）时绝对不能使用，必须用非全面调查。</li></ul>` },
            { category: '选择题考点', title: '5. 组距式分组：向上累计频数计算', content: `<p><b>向上累计：</b>从变量值小的组开始向变量值大的方向逐组累加。</p><p class="mt-1"><b>物理意义：</b>若上限为 $U$，累计频数为 300，代表样本中变量值<b>小于或等于</b>上限 $U$ 的个体一共有 300 个。</p>` },
            { category: '选择题考点', title: '6. 偏态分布下的三值大小排序关系', content: `<ul class="space-y-2 mt-1"><li><b>对称分布 (正态)：</b>$\\bar{x} = M_e = M_o$</li><li><b>右偏分布 (正偏)：</b>$\\bar{x} > M_e > M_o$<br><span class="text-[10px] text-slate-500">均值受右侧极端大值拉动最为明显，数值最大。</span></li><li><b>左偏分布 (负偏)：</b>$\\bar{x} < M_e < M_o$<br><span class="text-[10px] text-slate-500">均值受左侧极端小值拉动最为明显，数值最小。</span></li></ul>` },
            { category: '选择题考点', title: '7. 置信区间宽度与样本容量的关系', content: `<p>极限误差公式：$$E = z_{\\alpha/2} \\times \\frac{\\sigma}{\\sqrt{n}}$$</p><p class="mt-2"><b>规律：</b>当置信水平和总体变异程度不变时，若要缩小置信区间（变窄/更精准），必须<b>增大</b>样本容量 $n$。反之缩小 $n$ 会导致区间变宽。</p>` },
            { category: '选择题考点', title: '8. 点估计局限性与区间估计的引入', content: `<p><b>点估计缺陷：</b>未考虑抽样随机波动，无法给出误差范围和估计值的可靠程度。</p><p class="mt-1"><b>解决方法：</b>区间估计。提供由“点估计值 $\\pm$ 抽样极限误差”构成的区间，并赋予置信水平。</p>` },
            { category: '选择题考点', title: '9. 假设检验中显著性水平 $\\alpha$ 的辨析', content: `<p><b>本质：</b>指原假设 $H_0$ 为真时，却被拒绝的概率（第一类/弃真错误）。</p><p class="mt-1 text-rose-600"><i class="fa-solid fa-triangle-exclamation"></i> 避坑：</p><ul class="list-disc pl-4 text-slate-600"><li>不是“原假设不成立的概率”。</li><li>$\\alpha$ 减小，犯第二类错误 (取伪) 的概率 $\\beta$ 会增大（$n$ 固定时）。</li></ul>` },
            { category: '选择题考点', title: '10. 单因素方差分析的三大基本假定', content: `<ul class="list-disc pl-4 space-y-1"><li><b>独立性：</b>各观测值相互独立。</li><li><b>正态性：</b>各控制变量水平下的因变量总体服从正态分布。</li><li><b>方差齐性：</b>各水平下总体的方差必须相等 ($\\sigma_1^2 = \\sigma_2^2 = \\dots = \\sigma_k^2$)。</li></ul>` },
            { category: '判断题考点', title: '11. 平均指数与加权算术平均指数', content: `<p><b>知识点：</b>平均指数不仅包括加权算术平均指数，还包括加权调和平均指数。只有在特定条件（如用 $q_0 p_0$ 加权）下，加权算术平均才等价于拉氏综合指数。</p>` },
            { category: '判断题考点', title: '12. 总量/质量/数量指标辨析', content: `<ul class="list-disc pl-4 space-y-1"><li><b>总量/数量指标：</b>反映“规模、大小”的绝对数（如总人口、GDP）。</li><li><b>质量指标：</b>反映“水平、结构、效益”的相对数或平均数（如合格率、平均单价）。</li></ul>` },
            { category: '判断题考点', title: '13. P值决策准则', content: `<p>若 $P\\text{值} \\le \\alpha$，则拒绝原假设 $H_0$。</p><p class="mt-1 text-slate-500">解释：P值越小，说明在原假设成立的前提下发生该样本现象的概率极低，怀疑其真实性从而拒绝。</p>` },
            { category: '判断题考点', title: '14. 样本容量与估计精度', content: `<p><b>规律：</b>增大样本量 $n$ $\\rightarrow$ 抽样误差变小 $\\rightarrow$ 估计精度提高，置信区间变窄。</p>` },
            { category: '判断题考点', title: '15. 方差分析的原假设 $H_0$', content: `<p><b>含义：</b>控制因素的各水平对因变量无显著影响。</p><p>$$H_0: \\mu_1 = \\mu_2 = \\dots = \\mu_k$$</p>` },
            { category: '判断题考点', title: '16. 峰度系数 (Kurtosis)', content: `<ul class="list-disc pl-4"><li>$K = 0$：正态峰。</li><li>$K > 0$：高峰态 (尖峰/重尾分布)。</li><li>$K < 0$：平峰态。</li></ul>` },
            { category: '判断题考点', title: '17. 自变量类型在分析中的处理', content: `<ul class="list-disc pl-4"><li><b>方差分析：</b>定类/定序自变量直接作为分组因素。</li><li><b>回归分析：</b>定类自变量不能直接带入连续模型，必须先转化为<b>虚拟变量 (Dummy Variable)</b>（如取0或1）。</li></ul>` },
            { category: '判断题考点', title: '18. 时间序列的趋势预测法', content: `<p>当逐期增长量大体相等（常数）时，呈现线性（等差）变动。最适合拟合<b>一元线性趋势方程</b> ($Y_t = a + bt$)。</p>` },
            { category: '判断题考点', title: '19. $P > \\alpha$ 时的决策', content: `<p><b>结论：</b>不能拒绝原假设 $H_0$。这意味着当前没有足够的异常证据推翻原假设。</p>` },
            { category: '判断题考点', title: '20. 双总体均值检验方法选择', content: `<ul class="list-disc pl-4 space-y-1"><li>方差已知：无论样本大小一律用 $Z$ 检验。</li><li>方差未知且大样本：用样本方差代替，使用 $Z$ 检验。</li><li>方差未知且小样本 (正态)：必须使用 $t$ 检验，并计算合并方差 $s_p^2$。</li></ul>` }
        ];

        const dbQuestions = [
            // MCQ 1-10
            { id: 'q_1', type: 'mcq', category: '描述统计基础', title: '概念辨析：标志与指标的归属', text: '某自动化生产线生产20kg袋装建材。在抽样质检中，“一袋具体抽中的建材重量为20.15kg”与“这批建材的平均袋装重量为19.98kg”，在统计学中分别称为什么？', options: ['指标表现、数量标志表现', '数量标志表现、指标值', '品质标志、数量标志', '品质标志、指标表现'], correct: 1, explanation: '一袋具体建材的重量属于<b>个体单位的数量标志表现</b>；而反映该批次全体建材的平均重量属于<b>总体指标的指标值</b>。标志反映个体特征，指标反映总体特征。' },
            { id: 'q_2', type: 'mcq', category: '描述统计基础', title: '概念辨析：变量与常量的演变', text: '在上述20kg袋装建材的生产工艺控制中，“标准设计规格20kg”与各袋建材在包装中“实际灌装的重量”在性质上分别属于：', options: ['常量、变量', '变量、常量', '连续型变量、离散型变量', '数量标志、品质标志'], correct: 0, explanation: '“20kg的标准设计规格”是一个不变的参考标准，属于<b>常量</b>；而在实际灌装过程中由于随机误差导致的“实际称重数值”在各件产品间是变动的，属于<b>变量</b>。' },
            { id: 'q_3', type: 'mcq', category: '描述统计基础', title: '统计指标特征：数量性与具体性', text: '我们在应用统计中常说“由于降雨增加，本月该地区水稻亩产达到了450公斤”。该论述体现了统计指标的哪些主要特征？', options: ['抽象性与综合性', '数量性与具体性', '主观性与绝对性', '综合性与离散性'], correct: 1, explanation: '该指标不仅有数字“450公斤”（数量性），而且指代特定地区时间（具体性），说明指标绝非抽象公式。' },
            { id: 'q_4', type: 'mcq', category: '描述统计基础', title: '统计指标分类：总量与质量指标', text: '在衡量某物流仓储公司的运营成效时，以下哪一组指标分类是<b>完全正确</b>的？', options: ['总发货量属于质量指标，平均破损率属于总量指标', '总发货量属于总量指标，平均破损率属于质量指标', '总发货量属于数量指标，平均破损率属于总量指标', '两项均属于质量指标'], correct: 1, explanation: '“总发货量”反映总规模，属<b>总量（数量）指标</b>；“平均破损率”反映质量，属<b>质量指标</b>。' },
            { id: 'q_5', type: 'mcq', category: '数据收集', title: '新冠接种针数调查：调查法选择', text: '为调查某超大社区居民新冠疫苗接种针数分布（0-4针）。在时间紧迫、预算有限且无法获取全部人员户籍变动信息的情况下，最适宜采用哪种调查方法？', options: ['全面登记普查', '随机抽样调查', '典型案例调查', '自愿报名式重点调查'], correct: 1, explanation: '当总体规模较大、耗资过高、时效性要求紧迫时，<b>抽样调查</b>是最有效非全面调查方法。' },
            { id: 'q_6', type: 'mcq', category: '数据收集', title: '疫苗调查变式：抽样设计辨析', text: '若上述新冠接种调查中，决定将该社区按年龄划分为“老年、中青年、儿童”三组，并在每组中分别按比例随机抽取居民。这属于：', options: ['整群抽样', '分层抽样', '系统抽样', '简单随机抽样'], correct: 1, explanation: '按某种特征（年龄）将总体划分为层，再从各层中独立抽取样本，属于<b>分层抽样</b>。' },
            { id: 'q_7', type: 'mcq', category: '数据收集', title: '全面调查（普查）性质考查', text: '关于国家组织开展的“人口普查”和“经济普查”，下列陈述中<b>错误</b>的是：', options: ['普查是一种具有周期性的特殊全面调查', '普查规定有统一的标准时点以避免重复和遗漏', '普查由于调查了全部单位，因此在实际操作中完全不存在任何误差', '普查一般不宜经常举行，因为耗资极大'], correct: 2, explanation: '普查虽无“抽样误差”，但登记人员过多，在实际操作中难免会产生漏出错报等<b>非抽样误差（登记性误差）</b>。' },
            { id: 'q_8', type: 'mcq', category: '数据收集', title: '非全面调查：典型调查与重点调查', text: '某行业协会为了解发展瓶颈，仅对行业中排名前10位的领头骨干企业（其产值占全行业80%以上）进行深入调查。这属于：', options: ['普查', '典型调查', '重点调查', '抽样调查'], correct: 2, explanation: '选择一部分具有决定性作用的重点单位（标志值占绝大比重）进行调查，属于<b>重点调查</b>。' },
            { id: 'q_9', type: 'mcq', category: '数据整理与展示', title: '组距式次数分布：向上累计考点', text: '在员工年龄分布表中，若“30-40岁”组的上限为 40 岁，该组的向上累计频数为 300 人。这意味着：', options: ['年龄在40岁以上的一共300人', '年龄在30岁以下的一共300人', '年龄在40岁及以下的一共300人', '该组内（30-40岁）一共300人'], correct: 2, explanation: '<b>向上累计频数</b>代表<b>小于或等于当前组上限（40岁）</b>的累计单位总数。' },
            { id: 'q_10', type: 'mcq', category: '数据整理与展示', title: '组距式次数分布：向下累计变式', text: '若“30-40岁”组的下限为 30 岁，该组的<b>向下累计频数</b>为 120 人。这意味着：', options: ['年龄在30岁及以上的人一共有120人', '年龄在30岁以下的人一共有120人', '年龄在40岁以上的人一共有120人', '该组内一共有120人'], correct: 0, explanation: '<b>向下累计频数</b>代表<b>大于或等于当前组下限（30岁）</b>的累计单位总数。' },
            
            // MCQ 11-20
            { id: 'q_11', type: 'mcq', category: '分布特征的描述', title: '右偏分布下的三值排序关系', text: '当某项投资收益率分布呈现典型的<b>右偏（正偏，尾部在右侧）</b>时，其均值（$\\bar{x}$）、中位数（$M_e$）与众数（$M_o$）三者的大小排序为：', options: ['$\\bar{x} > M_e > M_o$', '$\\bar{x} < M_e < M_o$', '$\\bar{x} = M_e = M_o$', '$M_e > \\bar{x} > M_o$'], correct: 0, explanation: '在右偏分布中，由于右侧极少数极端大值的拉动作用，均值被大幅拉向右侧，数值最大。排序为 $\\bar{x} > M_e > M_o$。' },
            { id: 'q_12', type: 'mcq', category: '分布特征的描述', title: '左偏分布下的三值排序关系', text: '在一次难度较高的期末考试中，若学生成绩呈现明显的<b>左偏（负偏，尾部在左侧）</b>分布，则其排序为：', options: ['$\\bar{x} > M_e > M_o$', '$\\bar{x} < M_e < M_o$', '$\\bar{x} = M_e = M_o$', '$M_o < M_e < \\bar{x}$'], correct: 1, explanation: '左偏分布长尾偏向左方（存在极端低分），均值最易受异常值的拖累，数值最小。排序关系为 $\\bar{x} < M_e < M_o$。' },
            { id: 'q_13', type: 'mcq', category: '参数估计', title: '区间估计精度与样本容量的微调', text: '在总体标准差不变前提下，若要求将总体均值的置信区间半宽度（抽样极限误差）<b>缩小为原来的 $\\frac{1}{3}$</b>，则样本量 $n$ 应变为：', options: ['原来的 3 倍', '原来的 6 倍', '原来的 9 倍', '原来的 $\\frac{1}{9}$ 倍'], correct: 2, explanation: '极限误差公式 $E = z_{\\alpha/2} \\frac{\\sigma}{\\sqrt{n}}$。要使 $E$ 缩小为 $\\frac{1}{3}$，分母的 $\\sqrt{n}$ 必须扩大 3 倍，故 $n$ 必须扩大为 9 倍。' },
            { id: 'q_14', type: 'mcq', category: '参数估计', title: '置信水平变动对区间宽度的影响', text: '在样本容量不变的前提下，若将置信水平从 90% <b>提升至 95%</b>，则置信区间的宽度会：', options: ['变窄（估计精度提高）', '变宽（估计精度降低，但可靠性提高）', '保持完全不变', '无法确定其如何变动'], correct: 1, explanation: '置信水平越高，$z_{\\alpha/2}$ 越大，极限误差 $E$ 变大，导致置信区间<b>变宽</b>。' },
            { id: 'q_15', type: 'mcq', category: '参数估计', title: '参数估计：点估计缺陷及解决方法', text: '关于点估计（Point Estimation）的缺陷，下列描述中<b>最精确</b>的是：', options: ['计算繁杂无法应用于大样本', '未能结合抽样误差，无法给出这一估计的可靠程度与误差范围', '估计值绝对不会等于总体参数真实值', '缺陷可通过增加样本容量完全消除'], correct: 1, explanation: '点估计不具有区间范围和概率置信度的评价能力。必须结合抽样误差引入<b>区间估计</b>。' },
            { id: 'q_16', type: 'mcq', category: '参数估计', title: '区间估计：极限误差的构成', text: '在总体均值区间估计中，被称为“抽样极限误差”或“估计误差范围”的项是：', options: ['$\\bar{x}$', '$z_{\\alpha/2} \\frac{\\sigma}{\\sqrt{n}}$', '$\\frac{\\sigma}{\\sqrt{n}}$', '$\\bar{x} \\pm z_{\\alpha/2} \\frac{\\sigma}{\\sqrt{n}}$'], correct: 1, explanation: '极限误差为 $E = z_{\\alpha/2} \\frac{\\sigma}{\\sqrt{n}}$。它是估计值偏离真实参数的最大可能边界。' },
            { id: 'q_17', type: 'mcq', category: '假设检验', title: '假设检验中的显著性水平α本质', text: '在进行假设检验决策时，我们设定的显著性水平 $\\alpha = 0.05$。其正确的概率含义是：', options: ['当原假设不成立时，我们却接受了原假设的概率', '当原假设实际上为真时，我们做出了拒绝原假设的错误概率', '原假设成立的真实概率为 5%', '备择假设成立的概率为 95%'], correct: 1, explanation: '显著性水平 $\\alpha$ 代表<b>第一类错误（弃真错误）</b>的发生概率。' },
            { id: 'q_18', type: 'mcq', category: '假设检验', title: '两类错误的此消彼长关系', text: '在样本量固定不变前提下，若将显著性水平 $\\alpha$ 从 0.05 <b>降低到 0.01</b>，则：', options: ['犯第二类错误的概率 $\\beta$ 会减小', '犯第二类错误的概率 $\\beta$ 会随之增大', '第一类和第二类错误的概率不受影响', '检验效能将大幅提高'], correct: 1, explanation: '样本量固定时，$\\alpha$ 与 $\\beta$ 是此消彼长的。$\\alpha$ 减小使得犯“取伪错误”的可能 $\\beta$ 增加。' },
            { id: 'q_19', type: 'mcq', category: '方差分析', title: '单因素方差分析的基本假定', text: '关于单因素方差分析的三个核心假定，下列选项中不属于其前提假设的是：', options: ['观测值相互独立', '各组样本总体服从正态分布', '各组总体的方差必须具有齐性', '各组总体的期望均值在初始状态下必须完全相等'], correct: 3, explanation: '三大假定是：<b>独立性、正态性、方差齐性</b>。“均值是否相等”是待检验的原假设，不是前提假定。' },
            { id: 'q_20', type: 'mcq', category: '方差分析', title: '方差分析假定违背的诊断方法', text: '在实际应用方差分析前，通常采用哪种检验来对“方差齐性”这一假定进行诊断？', options: ['莱文检验 (Levene\'s Test)', 't 检验 (t-Test)', '德宾-瓦森检验 (Durbin-Watson Test)', '卡方拟合优度检验'], correct: 0, explanation: '<b>莱文检验 (Levene\'s Test)</b> 常用于多组独立样本的方差齐性检验。' },

            // TF 1-10 (Mapped to 21-30 internally)
            { id: 'tf_1', type: 'tf', category: '统计指数', title: '平均指数与加权算术平均指数的等同关系辨析', text: '平均指数不仅等同于加权算术平均指数，它在统计应用中并没有其他表现形式。', correct: false, explanation: '错误。平均指数是总指数的形式之一，不仅包括<b>加权算术平均指数</b>，还包括<b>加权调和平均指数</b>。' },
            { id: 'tf_2', type: 'tf', category: '统计指数', title: '平均指数等价综合指数的加权条件', text: '只有在采用基期总值（$q_0 p_0$）作为权数的前提下，加权算术平均指数才在计算结果上与拉氏数量指数完全等价。', correct: true, explanation: '正确。加权算术平均指数以基期总值加权展开后即为拉氏数量指数。' },
            { id: 'tf_3', type: 'tf', category: '描述统计基础', title: '总量指标的数理特征', text: '某地区的“地区生产总值(GDP)”、“社会消费品零售总额”由于带有总规模、总水平的绝对特征，因此均属于总量（数量）指标。', correct: true, explanation: '正确。总量指标是用绝对数来反映社会经济现象在特定状态下的总规模或工作总量。' },
            { id: 'tf_4', type: 'tf', category: '描述统计基础', title: '质量指标的数理特征', text: '某上市公司的“资产负债率”、“平均人工成本”由于是以相对比率或平均数形式表现的，因此在统计分类上应划为质量指标。', correct: true, explanation: '正确。质量指标反映总体的结构、比率、强度或效益，主要用相对指标或平均指标表达。' },
            { id: 'tf_5', type: 'tf', category: '假设检验', title: 'P值决策规则判定', text: '在进行参数假设检验时，若我们计算得出的双侧检验 $P$ 值大于给定的显著性水平 $\\alpha$，则我们应该做出“不拒绝原假设 $H_0$”的决定。', correct: true, explanation: '正确。$P$ 值大于 $\\alpha$ 代表观测结果不具有统计学显著性，因此应当不拒绝原假设。' },
            { id: 'tf_6', type: 'tf', category: '假设检验', title: 'P值物理意义判定', text: '假设检验中的 $P$ 值代表的是“原假设成立的概率”。', correct: false, explanation: '错误。$P$ 值是在<b>原假设为真</b>的条件下，获得当前样本观测值或更极端结果的概率。' },
            { id: 'tf_7', type: 'tf', category: '参数估计', title: '样本量对抽样估计精度的影响', text: '在总体方差相同的情况下，增大样本量 $n$ 可以直接减小抽样平均误差，从而大幅提升参数区间估计的精准度。', correct: true, explanation: '正确。抽样标准误差 $S_e = \\frac{\\sigma}{\\sqrt{n}}$。样本量大误差变小，估计精度越好。' },
            { id: 'tf_8', type: 'tf', category: '参数估计', title: '样本量对置信区间宽度的影响', text: '对于同一个总体进行区间估计，在其他条件相同下，样本量越大，构建出的置信区间宽度就越宽。', correct: false, explanation: '错误。样本量 $n$ 越大，极限误差 $E$ 越小，得到的置信区间宽度越<b>窄</b>（精度更高）。' },
            { id: 'tf_9', type: 'tf', category: '方差分析', title: '方差分析的原假设表述', text: '在单因素方差分析中，设有 $k$ 个处理水平，其原假设通常写作 $H_0: \\mu_1 = \\mu_2 = \\dots = \\mu_k$。', correct: true, explanation: '正确。方差分析的零假设一律是各控制组总体期望均值相等。' },
            { id: 'tf_10', type: 'tf', category: '方差分析', title: '方差分析的备择假设表述', text: '方差分析的备择假设 $H_1$ 的精确含义是指“因素各水平下的总体均值 $\\mu_1, \\mu_2, \\dots, \\mu_k$ 完全不相等（均不相同）”。', correct: false, explanation: '错误。备择假设 $H_1$ 为“各组总体均值<b>不全相等</b>”，只要有两组之间存在显著差异即可。' },
            
            // TF 11-20 (Mapped to 31-40 internally)
            { id: 'tf_11', type: 'tf', category: '分布特征的描述', title: '超额峰度系数大于0的含义', text: '若某分布的超额峰度系数 $K$ 值为 70（$K > 0$），说明该分布呈现高峰态（尖峰分布）。', correct: true, explanation: '正确。峰度系数 $K > 0$ 表示该分布在中心部位比正态分布更为尖峭，且拥有肥厚的厚尾。' },
            { id: 'tf_12', type: 'tf', category: '分布特征的描述', title: '超额峰度系数小于0的含义', text: '超额峰度系数 $K$ 小于 0 意味着其分布比正态分布具有更为扁平、平缓的顶部特征，属于平峰态分布。', correct: true, explanation: '正确。$K < 0$ 代表分布在顶部表现得较为平缓宽阔，即为平峰态。' },
            { id: 'tf_13', type: 'tf', category: '自变量类型在分析中的差异', title: '方差分析对自变量类型的要求', text: '方差分析（ANOVA）在应用中，其因变量必须是数值型（连续）变量，而自变量通常必须是定类或定序变量。', correct: true, explanation: '正确。方差分析核心检验分类型自变量对连续型因变量的影响。' },
            { id: 'tf_14', type: 'tf', category: '自变量类型在分析中的差异', title: '回归分析对分类自变量的处理要求', text: '若在回归中存在“性别”这类定类自变量，必须直接将原类别代入公式，不可转化为0和1的虚拟编码。', correct: false, explanation: '错误。定类自变量必须经过<b>虚拟变量（哑变量）</b>编码转化（如：女=1，男=0）后才能引入回归模型。' },
            { id: 'tf_15', type: 'tf', category: '时间序列分析', title: '时间序列等差趋势预测方法', text: '若时间序列中各年的逐期增长量大体相等（基本呈等差变动），则适宜拟合一元线性趋势模型进行预测。', correct: true, explanation: '正确。逐期增长量相等意味着序列具有稳定的等差变化趋势，适合一元线性拟合。' },
            { id: 'tf_16', type: 'tf', category: '时间序列分析', title: '时间序列等比趋势预测方法', text: '若时间序列中各年的环比发展速度大体相等（呈等比变动），则适宜采用线性趋势方程开展推测。', correct: false, explanation: '错误。环比发展速度相等表明按固定比例指数变动。应当拟合指数曲线或几何平均模型。' },
            { id: 'tf_17', type: 'tf', category: '假设检验', title: 'P值大于显性水平时的最终决策', text: '当计算出的 $P \\text{值} > \\alpha$ 时，合理的统计学结论是“不拒绝原假设”，认为并无充分证据证明原假设不成立。', correct: true, explanation: '正确。$P$ 值大于显著性阈值代表结果并不罕见，因而我们由于“证据不足”无法拒绝原假设。' },
            { id: 'tf_18', type: 'tf', category: '假设检验', title: '不拒绝原假设的数学证明深度辨析', text: '假设检验中我们不拒绝原假设 $H_0$，说明我们已经在数学上100%严谨地推导证明了 $H_0$ 是绝对真实的。', correct: false, explanation: '错误。<b>“不拒绝原假设”不等于“证明原假设为真”</b>，只是说当前样本还没有提供足够强的反面证据去推翻它。' },
            { id: 'tf_19', type: 'tf', category: '参数估计与检验方法选择', title: '双总体期望均值：方差已知时的选择', text: '检验两个独立总体的期望均值是否相等时，只要已知两个总体的方差 $\\sigma_1^2, \\sigma_2^2$，无论两样本大小，一律采用 $Z$ 检验。', correct: true, explanation: '正确。总体方差已知是标准的正态总体参数检验情形，应当采用 $Z$ 检验。' },
            { id: 'tf_20', type: 'tf', category: '参数估计与检验方法选择', title: '双总体期望均值：小样本方差未知时的选择', text: '在检验两个独立总体均值是否相等时，若两总体方差未知且为小样本，在正态前提下，一律采用 $t$ 检验并需合并样本方差。', correct: true, explanation: '正确。正态假定下，小样本、方差未知时，使用双独立样本 $t$ 检验，需要依靠合并方差 $s_p^2$ 计算。' }
        ];

        const appState = {
            currentTab: 'quiz', // 'quiz' or 'study'
            currentMode: 'practice', // 'practice' or 'exam'
            wrongQuestions: new Set(),
            starredQuestions: new Set(),
            answers: {},
            examSubmitted: false,
            currentList: [...dbQuestions],
            currentIndex: 0,
            filterMode: 'all'
        };

        function switchTab(tabId) {
            appState.currentTab = tabId;
            const viewQuiz = document.getElementById('view-quiz');
            const viewStudy = document.getElementById('view-study');
            const tabQuizBtn = document.getElementById('tab-quiz');
            const tabStudyBtn = document.getElementById('tab-study');
            const topActions = document.getElementById('quiz-header-actions');

            if (tabId === 'quiz') {
                viewQuiz.classList.remove('hidden');
                viewStudy.classList.add('hidden');
                viewStudy.classList.remove('flex');
                
                // Active Styling
                tabQuizBtn.className = "flex-1 h-full flex flex-col items-center justify-center gap-1 text-indigo-600 transition border-t-2 border-indigo-600 font-bold";
                tabStudyBtn.className = "flex-1 h-full flex flex-col items-center justify-center gap-1 text-slate-400 hover:text-indigo-500 transition border-t-2 border-transparent font-normal";
                topActions.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                viewQuiz.classList.add('hidden');
                viewStudy.classList.remove('hidden');
                viewStudy.classList.add('flex');
                
                // Active Styling
                tabQuizBtn.className = "flex-1 h-full flex flex-col items-center justify-center gap-1 text-slate-400 hover:text-indigo-500 transition border-t-2 border-transparent font-normal";
                tabStudyBtn.className = "flex-1 h-full flex flex-col items-center justify-center gap-1 text-indigo-600 transition border-t-2 border-indigo-600 font-bold";
                topActions.classList.add('opacity-0', 'pointer-events-none');

                // Initial render of Study Cards
                if (document.getElementById('study-cards-container').children.length === 0) {
                    renderStudyCards();
                }
            }
        }

        function renderStudyCards() {
            const container = document.getElementById('study-cards-container');
            container.innerHTML = '';

            studyNotes.forEach((note) => {
                const card = document.createElement('div');
                let badgeColor = note.category.includes('选择题') ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-fuchsia-50 text-fuchsia-600 border-fuchsia-200';
                
                card.className = "bg-white p-5 rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-slate-100 mb-4";
                card.innerHTML = `
                    <div class="flex items-center space-x-2 mb-3">
                        <span class="text-[10px] font-bold px-2 py-0.5 border rounded-md ${badgeColor}">${note.category}</span>
                    </div>
                    <h3 class="text-sm font-bold text-slate-800 mb-2.5 leading-snug">${note.title}</h3>
                    <div class="text-[13px] text-slate-600 leading-relaxed bg-slate-50 p-3.5 rounded-xl border border-slate-100/60 font-medium">
                        ${note.content}
                    </div>
                `;
                container.appendChild(card);
            });

            // Typeset MathJax
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([container]).catch((err) => console.log('MathJax error: ', err.message));
            }
        }

        function switchMode(mode) {
            appState.currentMode = mode;
            const prBtn = document.getElementById('btn-practice-mode');
            const exBtn = document.getElementById('btn-exam-mode');
            const submitBtn = document.getElementById('btn-exam-submit');

            if (mode === 'practice') {
                prBtn.className = "px-3 py-1.5 bg-white text-indigo-900 rounded-full font-bold shadow-sm";
                exBtn.className = "px-3 py-1.5 text-white hover:bg-white/10 rounded-full font-medium transition-all";
                submitBtn.classList.add('hidden');
            } else {
                exBtn.className = "px-3 py-1.5 bg-white text-indigo-900 rounded-full font-bold shadow-sm";
                prBtn.className = "px-3 py-1.5 text-white hover:bg-white/10 rounded-full font-medium transition-all";
                if (!appState.examSubmitted) {
                    submitBtn.classList.remove('hidden');
                }
            }
            renderActiveQuestion();
            updateStats();
        }

        function toggleStar() {
            const activeQ = appState.currentList[appState.currentIndex];
            if (!activeQ) return;
            appState.starredQuestions.has(activeQ.id) ? appState.starredQuestions.delete(activeQ.id) : appState.starredQuestions.add(activeQ.id);
            updateStarIcon();
        }

        function updateStarIcon() {
            const activeQ = appState.currentList[appState.currentIndex];
            const icon = document.getElementById('star-icon');
            if (activeQ && appState.starredQuestions.has(activeQ.id)) {
                icon.className = "fa-solid fa-star text-amber-400";
            } else {
                icon.className = "fa-regular fa-star text-slate-300";
            }
        }

        function toggleFilter() {
            const btn = document.getElementById('btn-filter-wrong');
            if (appState.filterMode === 'all') {
                if (appState.wrongQuestions.size === 0) {
                    showToast('您的错题本目前是空的哦！继续保持！');
                    return;
                }
                appState.filterMode = 'wrong';
                appState.currentList = [...dbQuestions].filter(q => appState.wrongQuestions.has(q.id));
                btn.className = "text-rose-500 font-bold transition flex items-center gap-1 scale-105 transform";
                showToast('已进入错题重做模式！');
            } else {
                appState.filterMode = 'all';
                appState.currentList = [...dbQuestions];
                btn.className = "text-slate-500 hover:text-rose-500 transition flex items-center gap-1";
                showToast('已切回全部题库模式！');
            }
            appState.currentIndex = 0;
            renderActiveQuestion();
            updateStats();
        }

        let touchStartX = 0, touchEndX = 0;
        const quizCardElement = document.getElementById('quiz-card');
        quizCardElement.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, false);
        quizCardElement.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) navigateQuestion(1);  // Swipe Left -> Next
            else if (touchStartX - touchEndX < -50) navigateQuestion(-1); // Swipe Right -> Prev
        }, false);

        function renderActiveQuestion() {
            const activeQ = appState.currentList[appState.currentIndex];
            if (!activeQ) {
                document.getElementById('card-title').innerText = "暂无题目";
                document.getElementById('card-text').innerText = "当前没有符合条件的题目。";
                document.getElementById('card-choices').innerHTML = "";
                document.getElementById('card-feedback').classList.add('hidden');
                return;
            }

            document.getElementById('lbl-question-index').innerText = `${appState.currentIndex + 1}/${appState.currentList.length}`;
            document.getElementById('card-badge').innerText = activeQ.category;
            
            const qTypeLabel = activeQ.type === 'mcq' ? '单选' : '判断';
            const qTypeColor = activeQ.type === 'mcq' ? 'text-blue-600' : 'text-fuchsia-600';
            document.getElementById('card-title').innerHTML = `<span class="${qTypeColor} mr-1.5 font-extrabold">[${qTypeLabel}]</span>${activeQ.title}`;
            document.getElementById('card-text').innerHTML = activeQ.text;
            updateStarIcon();

            const choicesDiv = document.getElementById('card-choices');
            choicesDiv.innerHTML = '';
            const userChoice = appState.answers[activeQ.id];
            const isAnswered = userChoice !== undefined;

            // Render Logic (MCQ & True/False)
            if (activeQ.type === 'mcq') {
                activeQ.options.forEach((opt, oIdx) => {
                    let optStyle = "border-slate-200 bg-white text-slate-700 hover:border-slate-300";
                    let prefixIcon = `<span class="w-7 h-7 rounded-full border border-slate-300 flex items-center justify-center text-[11px] font-bold text-slate-400 mr-3 shrink-0 bg-slate-50">${String.fromCharCode(65 + oIdx)}</span>`;
                    const isSelected = userChoice === oIdx;

                    if (appState.currentMode === 'practice') {
                        if (isSelected) {
                            if (oIdx === activeQ.correct) { 
                                optStyle = "bg-emerald-50 border-emerald-400 text-emerald-900 font-semibold"; 
                                prefixIcon = `<span class="w-7 h-7 rounded-full bg-emerald-500 text-white flex items-center justify-center text-[11px] mr-3 shrink-0 shadow-sm"><i class="fa-solid fa-check"></i></span>`; 
                            } else { 
                                optStyle = "bg-rose-50 border-rose-400 text-rose-900 font-semibold"; 
                                prefixIcon = `<span class="w-7 h-7 rounded-full bg-rose-500 text-white flex items-center justify-center text-[11px] mr-3 shrink-0 shadow-sm"><i class="fa-solid fa-xmark"></i></span>`; 
                            }
                        } else if (oIdx === activeQ.correct && isAnswered) {
                            optStyle = "bg-emerald-50/40 border-emerald-300 text-emerald-800"; 
                            prefixIcon = `<span class="w-7 h-7 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-[11px] mr-3 shrink-0 border border-emerald-200"><i class="fa-solid fa-check"></i></span>`;
                        }
                    } else {
                        if (isSelected) { 
                            optStyle = "bg-indigo-50 border-indigo-500 text-indigo-900 font-semibold shadow-sm"; 
                            prefixIcon = `<span class="w-7 h-7 rounded-full bg-indigo-600 text-white flex items-center justify-center text-[11px] font-bold mr-3 shrink-0 shadow-sm">${String.fromCharCode(65 + oIdx)}</span>`; 
                        }
                        if (appState.examSubmitted) {
                            if (oIdx === activeQ.correct) { 
                                optStyle = "bg-emerald-50 border-emerald-400 text-emerald-900 font-semibold"; 
                                prefixIcon = `<span class="w-7 h-7 rounded-full bg-emerald-500 text-white flex items-center justify-center text-[11px] mr-3 shrink-0 shadow-sm"><i class="fa-solid fa-check"></i></span>`; 
                            } else if (isSelected) { 
                                optStyle = "bg-rose-50 border-rose-400 text-rose-900 font-semibold"; 
                                prefixIcon = `<span class="w-7 h-7 rounded-full bg-rose-500 text-white flex items-center justify-center text-[11px] mr-3 shrink-0 shadow-sm"><i class="fa-solid fa-xmark"></i></span>`; 
                            }
                        }
                    }
                    const disabledAttr = (appState.currentMode === 'practice' && isAnswered) || (appState.currentMode === 'exam' && appState.examSubmitted) ? "disabled" : "";
                    choicesDiv.innerHTML += `<button onclick="chooseOption(${oIdx})" ${disabledAttr} class="w-full text-left p-3.5 rounded-xl border text-[13px] transition-all duration-200 flex items-center shadow-sm ${optStyle}">${prefixIcon}<span class="flex-1">${opt}</span></button>`;
                });
            } else if (activeQ.type === 'tf') {
                const tfOptions = [
                    { value: true, label: '正确 (True)' },
                    { value: false, label: '错误 (False)' }
                ];
                tfOptions.forEach(opt => {
                    let optStyle = "border-slate-200 bg-white text-slate-700 hover:border-slate-300";
                    let baseIconClass = opt.value ? 'fa-check' : 'fa-xmark';
                    let prefixIcon = `<span class="w-7 h-7 rounded-full border border-slate-300 flex items-center justify-center text-slate-300 mr-3 shrink-0 bg-slate-50"><i class="fa-solid ${baseIconClass} text-[10px]"></i></span>`;
                    
                    const isSelected = userChoice === opt.value;

                    if (appState.currentMode === 'practice') {
                        if (isSelected) {
                            if (opt.value === activeQ.correct) {
                                optStyle = "bg-emerald-50 border-emerald-400 text-emerald-900 font-semibold";
                                prefixIcon = `<span class="w-7 h-7 rounded-full bg-emerald-500 text-white flex items-center justify-center text-[11px] mr-3 shrink-0 shadow-sm"><i class="fa-solid fa-check"></i></span>`;
                            } else {
                                optStyle = "bg-rose-50 border-rose-400 text-rose-900 font-semibold";
                                prefixIcon = `<span class="w-7 h-7 rounded-full bg-rose-500 text-white flex items-center justify-center text-[11px] mr-3 shrink-0 shadow-sm"><i class="fa-solid fa-xmark"></i></span>`;
                            }
                        } else if (opt.value === activeQ.correct && isAnswered) {
                            optStyle = "bg-emerald-50/40 border-emerald-300 text-emerald-800";
                            prefixIcon = `<span class="w-7 h-7 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-[11px] mr-3 shrink-0 border border-emerald-200"><i class="fa-solid fa-check"></i></span>`;
                        }
                    } else {
                        // Exam Mode TF rendering
                        if (isSelected) {
                            optStyle = "bg-indigo-50 border-indigo-500 text-indigo-900 font-semibold shadow-sm";
                            prefixIcon = `<span class="w-7 h-7 rounded-full bg-indigo-600 text-white flex items-center justify-center text-[11px] mr-3 shrink-0 shadow-sm"><i class="fa-solid ${baseIconClass}"></i></span>`;
                        }
                        if (appState.examSubmitted) {
                            if (opt.value === activeQ.correct) {
                                optStyle = "bg-emerald-50 border-emerald-400 text-emerald-900 font-semibold";
                                prefixIcon = `<span class="w-7 h-7 rounded-full bg-emerald-500 text-white flex items-center justify-center text-[11px] mr-3 shrink-0 shadow-sm"><i class="fa-solid fa-check"></i></span>`;
                            } else if (isSelected) {
                                optStyle = "bg-rose-50 border-rose-400 text-rose-900 font-semibold";
                                prefixIcon = `<span class="w-7 h-7 rounded-full bg-rose-500 text-white flex items-center justify-center text-[11px] mr-3 shrink-0 shadow-sm"><i class="fa-solid fa-xmark"></i></span>`;
                            }
                        }
                    }
                    const disabledAttr = (appState.currentMode === 'practice' && isAnswered) || (appState.currentMode === 'exam' && appState.examSubmitted) ? "disabled" : "";
                    choicesDiv.innerHTML += `<button onclick="chooseOption(${opt.value})" ${disabledAttr} class="w-full text-left p-3.5 rounded-xl border text-[13px] transition-all duration-200 flex items-center shadow-sm ${optStyle}">${prefixIcon}<span class="flex-1 font-semibold tracking-wide">${opt.label}</span></button>`;
                });
            }

            // Render Feedback
            const feedbackBlock = document.getElementById('card-feedback');
            const showFeedback = (appState.currentMode === 'practice' && isAnswered) || (appState.currentMode === 'exam' && appState.examSubmitted);
            
            if (showFeedback) {
                const isCorrect = userChoice === activeQ.correct;
                feedbackBlock.className = `mt-5 p-4 rounded-xl border text-[12px] leading-relaxed transition-all duration-300 shadow-inner ${isCorrect ? 'bg-emerald-50/50 border-emerald-100 text-slate-700' : 'bg-rose-50/50 border-rose-100 text-slate-700'}`;
                
                let feedbackStatus = isCorrect 
                    ? `<span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-emerald-100 text-emerald-700 mb-2.5 tracking-wider uppercase"><i class="fa-solid fa-circle-check mr-1"></i>回答正确</span>`
                    : `<span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-rose-100 text-rose-700 mb-2.5 tracking-wider uppercase"><i class="fa-solid fa-circle-xmark mr-1"></i>回答错误</span>`;

                let rightAnswerText = activeQ.type === 'mcq'
                    ? String.fromCharCode(65 + activeQ.correct)
                    : (activeQ.correct ? '正确 (True)' : '错误 (False)');

                feedbackBlock.innerHTML = `
                    ${feedbackStatus}
                    <p class="mb-2 font-extrabold text-slate-800 text-[13px]">标准答案：<span class="text-indigo-600">${rightAnswerText}</span></p>
                    <div class="space-y-1 pt-2 border-t border-slate-200/60">
                        <span class="font-bold text-slate-500 block text-[10px] uppercase tracking-wider mb-1">考点深度解析</span>
                        <div class="text-slate-600 font-medium">${activeQ.explanation}</div>
                    </div>
                `;
                feedbackBlock.classList.remove('hidden');
            } else {
                feedbackBlock.classList.add('hidden');
            }

            // LaTeX rendering Request
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([document.getElementById('quiz-card')]).catch(err => console.log(err));
            }
        }

        function chooseOption(value) {
            const activeQ = appState.currentList[appState.currentIndex];
            if (!activeQ) return;
            appState.answers[activeQ.id] = value;
            
            if (value !== activeQ.correct) {
                appState.wrongQuestions.add(activeQ.id);
            } else if (appState.currentMode === 'practice') {
                appState.wrongQuestions.delete(activeQ.id);
            }
            
            renderActiveQuestion();
            updateStats();
            
            if (appState.currentMode === 'practice' && value === activeQ.correct) {
                setTimeout(() => navigateQuestion(1), 1000);
            }
        }

        function navigateQuestion(offset) {
            const newIndex = appState.currentIndex + offset;
            if (newIndex >= 0 && newIndex < appState.currentList.length) {
                appState.currentIndex = newIndex;
                const card = document.getElementById('quiz-card');
                const sign = offset > 0 ? 1 : -1;
                card.style.transform = `translateX(${sign * -30}px) scale(0.98)`;
                card.style.opacity = '0';
                
                setTimeout(() => {
                    renderActiveQuestion();
                    card.style.transform = 'translateX(0) scale(1)';
                    card.style.opacity = '1';
                }, 150);
            } else {
                showToast(offset > 0 ? '🎉 已经是最后一题啦！' : '已经是第一题啦！');
            }
        }

        function submitExam() {
            const answeredCount = Object.keys(appState.answers).length;
            if (answeredCount < dbQuestions.length) {
                showToast(`您还有 ${dbQuestions.length - answeredCount} 道题未作答！`);
                return;
            }
            appState.examSubmitted = true;
            document.getElementById('btn-exam-submit').classList.add('hidden');
            
            let score = 0;
            dbQuestions.forEach(q => {
                if (appState.answers[q.id] === q.correct) score++;
                else appState.wrongQuestions.add(q.id);
            });
            const acc = Math.round((score / dbQuestions.length) * 100);
            showToast(`模考交卷成功！得分：${score}/${dbQuestions.length} (${acc}%)`);
            
            appState.currentIndex = 0;
            renderActiveQuestion();
            updateStats();
        }

        function resetAll() {
            appState.answers = {};
            appState.examSubmitted = false;
            appState.currentIndex = 0;
            appState.wrongQuestions.clear();
            if(appState.filterMode === 'wrong'){
                 toggleFilter(); // turn off wrong mode gracefully
            } else {
                renderActiveQuestion();
                updateStats();
                showToast('已重置所有刷题记录！');
            }
            if (appState.currentMode === 'exam') {
                document.getElementById('btn-exam-submit').classList.remove('hidden');
            }
        }

        function updateStats() {
            const answeredCount = Object.keys(appState.answers).length;
            document.getElementById('lbl-answered-count').innerText = answeredCount;
            document.getElementById('lbl-wrong-count').innerText = appState.wrongQuestions.size;
            document.getElementById('top-progress-bar').style.width = `${(answeredCount / dbQuestions.length) * 100}%`;

            let accuracy = 0;
            if (answeredCount > 0) {
                let correctCount = 0;
                Object.entries(appState.answers).forEach(([id, val]) => {
                    const q = dbQuestions.find(item => item.id === id);
                    if (q && q.correct === val) correctCount++;
                });
                accuracy = Math.round((correctCount / answeredCount) * 100);
            }
            document.getElementById('lbl-accuracy').innerText = `${accuracy}%`;
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-24 left-1/2 transform -translate-x-1/2 z-[100] px-4 py-3 rounded-2xl shadow-2xl transition-all duration-300 flex items-center space-x-2.5 text-xs font-semibold bg-slate-900 text-white w-10/12 max-w-xs border border-slate-700`;
            toast.innerHTML = `<i class="fa-solid fa-circle-info text-cyan-400 text-base"></i><span>${msg}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-4', 'scale-95'); setTimeout(() => toast.remove(), 300); }, 2500);
        }

        window.onload = function() {
            // Set initial active tab properly
            switchTab('quiz');
            renderActiveQuestion();
            updateStats();
            
            // Show Gesture walkthrough explicitly
            setTimeout(() => {
                const guide = document.getElementById('gesture-guide');
                guide.classList.remove('opacity-0');
                setTimeout(() => guide.classList.add('opacity-0'), 2500);
            }, 800);
        };
    </script>
</body>
</html>
